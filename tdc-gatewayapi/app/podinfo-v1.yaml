apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo-v1
  namespace: apps
  labels:
    app: podinfo
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: podinfo
      version: v1
  template:
    metadata:
      labels:
        app: podinfo
        version: v1
    spec:
      containers:
        - name: podinfo
          image: ghcr.io/stefanprodan/podinfo:6.7.1
          ports:
            - name: http
              containerPort: 9898
          env:
            - name: PODINFO_UI_COLOR
              value: "#1d4ed8" # azul — visível do celular da plateia
            - name: PODINFO_UI_MESSAGE
              value: "v1 — estável"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: podinfo-v1
  namespace: apps
  labels:
    app: podinfo
    version: v1
spec:
  selector:
    app: podinfo
    version: v1
  ports:
    - name: http
      port: 9898
      targetPort: http
