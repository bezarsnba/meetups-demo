# Papel 3/3 — HTTPRoute: o DEV TEAM controla o roteamento, no namespace dele.
# Estado inicial: 100% do tráfego na v1.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: podinfo
  namespace: apps
spec:
  parentRefs:
    - name: demo-gateway
      namespace: infra
  rules:
    - backendRefs:
        - name: podinfo-v1
          port: 9898
          weight: 100
        - name: podinfo-v2
          port: 9898
          weight: 0
