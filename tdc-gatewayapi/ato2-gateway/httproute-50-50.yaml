# 50/50 — no telão e nos celulares da plateia, as cores alternam a cada refresh.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: podinfo
  namespace: apps
spec:
  parentRefs:
    - name: demo-gateway
      namespace: infra
  rules:
    - backendRefs:
        - name: podinfo-v1
          port: 9898
          weight: 50
        - name: podinfo-v2
          port: 9898
          weight: 50
