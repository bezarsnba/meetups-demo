# Canary 90/10 — traffic split é campo da spec, não annotation.
# Um typo aqui é REJEITADO pela API (validação de schema), não ignorado.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: podinfo
  namespace: apps
spec:
  parentRefs:
    - name: demo-gateway
      namespace: infra
  rules:
    - backendRefs:
        - name: podinfo-v1
          port: 9898
          weight: 90
        - name: podinfo-v2
          port: 9898
          weight: 10



          

