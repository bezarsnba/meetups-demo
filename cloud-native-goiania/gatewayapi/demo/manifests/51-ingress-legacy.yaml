---
# ❌ MÉTODO ANTIGO: Ingress (Vendor-specific annotations)
#
# Problemas:
# • nginx.ingress.kubernetes.io/... (annotations vendor-specific)
# • Sem padrão oficial
# • Sem separação: tudo em 1 recurso
# • Legado - Nginx será descontinuado em 2026

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: podinfo-ingress
  namespace: demo-app
  annotations:
    # ⚠️ Annotations Nginx (vendor-specific)
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: app.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: podinfo
                port:
                  number: 80
